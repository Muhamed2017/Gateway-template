spring:
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  
  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  cache:
    type: simple  # Use simple cache for development

logging:
  level:
    com.enterprise.gateway: DEBUG
    org.springframework.security: DEBUG
